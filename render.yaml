# Lucky Birr – Render Blueprint
# Deploy via https://dashboard.render.com/select-repo?type=web
# All sync:false variables must be set manually in the Render dashboard after deployment.

services:
  - type: web
    name: lucky-birr
    runtime: node
    # Node 22 is specified in package.json engines field
    region: oregon
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      # ----- Server -----
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ----- JWT (auto-generated by Render – no manual action required) -----
      - key: JWT_SECRET
        generateValue: true

      # ----- Supabase [REQUIRED] – set these in the Render dashboard -----
      - key: SUPABASE_URL
        sync: false          # e.g. https://xxxx.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # Never expose this to clients

      # ----- Public URL [REQUIRED after first deploy] -----
      # Set this to your Render service URL once it is assigned, e.g.:
      #   https://lucky-birr.onrender.com
      # Used for CORS. Leave unset on first deploy; set it after getting the URL.
      - key: WEBSITE_URL
        sync: false

      # ----- Admin access [REQUIRED for admin panel] -----
      - key: ADMIN_EMAILS
        sync: false          # Comma-separated list, e.g. admin@example.com

      # ----- Storage -----
      - key: SUPABASE_BUCKET
        value: screenshots   # Must match the bucket name created in Supabase

      # ----- Telegram notifications [optional] -----
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false

      # ----- Telegram inbound webhook [optional] -----
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
