<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucky Birr</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Lucky Birr</h1>
        <p class="subtitle">Submit your ticket details and payment screenshot.</p>

        <form id="submissionForm" enctype="multipart/form-data" novalidate>
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required autocomplete="name" />

          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" required inputmode="tel" />

          <label for="ticketNumber">Ticket Number</label>
          <input id="ticketNumber" name="ticketNumber" type="text" required />

          <label for="amount">Amount (ETB)</label>
          <input id="amount" name="amount" type="number" required min="1" step="0.01" />

          <label for="screenshot">Payment Screenshot (optional)</label>
          <input
            id="screenshot"
            name="screenshot"
            type="file"
            accept="image/png,image/jpeg,image/jpg,image/webp"
          />

          <button type="submit" id="submitButton">Submit</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
