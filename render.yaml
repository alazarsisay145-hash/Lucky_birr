services:
  - type: web
    name: lucky-birr
    runtime: node
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set this secret in the Render dashboard
      - key: WEBAPP_URL
        sync: false          # set to your Render URL, e.g. https://lucky-birr.onrender.com
